name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔧 Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Criar local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 🚀 Build APK (modo simplificado)
        run: |
          cd android
          chmod +x gradlew
          # Pular testes e tarefas desnecessárias
          ./gradlew assembleDebug -x test -x lint --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx2048m"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: follow-voice-chat-room
          path: android/app/build/outputs/apk/debug/*.apk
